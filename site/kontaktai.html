<!-- kontaktai.html – Rezervacijos forma su JS validacija -->
<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rezervuokite staliuką Kokteilių Maišykloje internetu.">
    <meta name="keywords" content="rezervacija, kontaktai, staliuko užsakymas">
    <title>Kokteilių Maišykla | Rezervacija</title>
    <!-- Bootstrap CSS karkasas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Projekto stiliai -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style2.css">
</head>
<body>
    <!-- navbar -->
    <header>
        <nav>
            <button class="menu-toggle" aria-label="Atidaryti meniu">☰</button>
            <ul class="navbar">
                <li><a href="index.html">Pradžia</a></li>
                <li><a href="meniu.html">Meniu</a></li>
                <li><a href="kontaktai.html">Rezervacija</a></li>
                <li><a href="galerija.html">Galerija</a></li>
                <li><a href="apie.html">Apie mus</a></li>
            </ul>
        </nav>
    </header>

    <!-- Rezervacijos forma -->
    <main class="container">
        <h1>Staliuko Rezervacija</h1>
        <button id="btn-theme" class="btn btn-secondary" style="margin-top: 15px;">
            ☀️ Šviesus režimas
        </button>
        <p>Užpildykite formą ir mes su jumis susisieksime.</p>
        
        <!-- Forma siunčia POST į /api/reservations (ND3 backend) -->
        <form action="#" method="post" class="reservation-form">
            <div class="form-group">
                <label for="vardas">Jūsų vardas:</label>
                <input type="text" id="vardas" name="vardas" required>
            </div>

            <div class="form-group">
                <label for="elPastas">El. paštas:</label>
                <input type="email" id="elPastas" name="elPastas" required>
            </div>

            <div class="form-group">
                <label for="data">Rezervacijos data:</label>
                <input type="date" id="data" name="data" required>
            </div>

            <div class="form-group">
                <label for="zmoniuSk">Žmonių skaičius:</label>
                <input type="number" id="zmoniuSk" name="zmoniuSk" min="1" max="20" value="2" required>
            </div>

            <input type="submit" value="Rezervuoti" class="btn-submit">
        </form>
        <div id="form-alert" class="alert-box"></div>
        <p style="margin-top:20px;font-size:14px;opacity:0.7;">
            Administratoriams: <a href="http://localhost:5173" target="_blank">rezervacijų valdymo panelė</a>
        </p>
    </main>

    <footer>
        <p>&copy; 2026 Kokteilių Maišykla. Visos teisės nesaugomos.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
